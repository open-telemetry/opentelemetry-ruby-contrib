name: opentelemetry-ruby-contrib
services:
  app:
    build:
      context: /home/james/repos/opentelemetry-ruby-contrib
      dockerfile: Dockerfile
    command:
      - /bin/bash
    depends_on:
      jaeger:
        condition: service_started
        required: true
      kafka:
        condition: service_started
        required: true
      memcached:
        condition: service_started
        required: true
      mongo:
        condition: service_started
        required: true
      mysql:
        condition: service_started
        required: true
      otelcol:
        condition: service_started
        required: true
      postgres:
        condition: service_started
        required: true
      rabbitmq:
        condition: service_started
        required: true
      redis:
        condition: service_started
        required: true
    environment:
      MEMCACHED_URL: memcached:11211
      TEST_MYSQ_DB: mysql
      TEST_MYSQL_HOST: mysql
      TEST_MYSQL_PORT: "3306"
      TEST_MYSQL_ROOT_PASSWORD: root
      TEST_MYSQL_USER: root
      TEST_POSTGRES_DB: postgres
      TEST_POSTGRES_HOST: postgres
      TEST_POSTGRES_PASSWORD: postgres
      TEST_POSTGRES_PORT: "5432"
      TEST_POSTGRES_USER: postgres
    image: opentelemetry/opentelemetry-ruby-contrib
    networks:
      default: null
    stdin_open: true
    tmpfs:
      - /tmp
    tty: true
    user: 1000:1000
    volumes:
      - type: bind
        source: /home/james/repos/opentelemetry-ruby-contrib
        target: /app
        bind:
          create_host_path: true
      - type: volume
        source: bundle
        target: /bundle
        volume: {}
    working_dir: /app
  base:
    command:
      - /bin/bash
    image: opentelemetry/opentelemetry-ruby-contrib
    networks:
      default: null
    stdin_open: true
    tmpfs:
      - /tmp
    tty: true
    user: 1000:1000
    volumes:
