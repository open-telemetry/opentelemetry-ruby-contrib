name: Local CLI Checks

on:
  pull_request:
    branches:
      - main
    paths:
      - "package.json"
      - "package-lock.json"
      - "Gemfile"
      - "Gemfile.lock"
      - ".github/workflows/ci-checks-local.yml"
  merge_group:

permissions:
  contents: read

jobs:
  automated-checks:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-26
          - windows-2025
    name: All / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          cache: "npm"
          node-version: "24"

      - name: Install Ruby
        uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1.319.0
        with:
          ruby-version: "3.3.11"

      - name: Install Chrome (Ubuntu only)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          echo "PUPPETEER_SKIP_DOWNLOAD=true" >> $GITHUB_ENV
          echo "PUPPETEER_EXECUTABLE_PATH=/usr/bin/google-chrome" >> $GITHUB_ENV

      - name: Install Chrome for Testing (macOS/Windows only)
        if: "${{!startsWith(matrix.os, 'ubuntu')}}"
        run: npx puppeteer browsers install chrome

      - name: Install Tools
        run: npm ci --ignore-scripts && npx puppeteer browsers install chrome && bundle install

      - name: Run All Checks
        run: |
          npm run check
        env:
          lsconfig: "-c .github/.linkspector-local_check.yml"
