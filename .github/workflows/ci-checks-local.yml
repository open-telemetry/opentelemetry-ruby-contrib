name: Local CLI Checks

on:
  pull_request:
    branches:
      - main
    paths:
      - "package.json"
      - "package-lock.json"
      - "Gemfile"
      - "Gemfile.lock"
      - ".github/workflows/ci-checks-local.yml"
  merge_group:

permissions:
  contents: read

jobs:
  automated-checks:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-26
          - windows-2025
    name: All / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache: "npm"
          node-version: "24"

      - name: Install Ruby
        uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1.310.0
        with:
          ruby-version: "3.3.11"

      - name: Install Chrome (Ubuntu only)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          echo "PUPPETEER_SKIP_DOWNLOAD=true" >> $GITHUB_ENV
          echo "PUPPETEER_EXECUTABLE_PATH=/usr/bin/google-chrome" >> $GITHUB_ENV

      - name: Install Chrome for Testing (macOS/Windows only)
        if: "${{!startsWith(matrix.os, 'ubuntu')}}"
        run: npx puppeteer browsers install chrome

      - name: Install Tools
        run: npm ci --ignore-scripts && npx puppeteer browsers install chrome && bundle install

      - name: Run All Checks
        run: |
          npm run check
        env:
          lsconfig: "-c .github/.linkspector-local_check.yml"
