name: Test / CI

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/release-help.yml"
      - ".toys/release/Gemfile"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  toys_release:
    if: ${{ github.repository == 'open-telemetry/opentelemetry-ruby-contrib' }}
    runs-on: ubuntu-24.04
    name: Toys-Release
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/.toys/release/Gemfile
    steps:
      - name: Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Ruby
        uses: ruby/setup-ruby@0dafeac902942906541bc140009cdbf32665b601 # v1.315.0
        with:
          ruby-version: "4.0.5"
          bundler-cache: true

      - name: Show help
        run: |
          bundle exec toys release --help < /dev/null
