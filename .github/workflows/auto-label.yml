name: Auto Label PRs

on:
  workflow_dispatch:
  pull_request_target: # zizmor: ignore[dangerous-triggers] Uses only base-branch config with pinned actions; no PR code is executed.
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  label:
    runs-on: ubuntu-24.04
    permissions:
      issues: write # required for creating labels
      pull-requests: write # required for adding labels to pr
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/labeler@f27b608878404679385c85cfa523b85ccb86e213 # v6.1.0
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
          sync-labels: true
