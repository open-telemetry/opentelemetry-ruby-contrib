name: Renovate Checks

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - .github/renovate.json5
      - .github/renovate-ci.json5
      - .github/workflows/renovate-checks.yml

jobs:
  renovate:
    runs-on: ubuntu-24.04
    name: Renovate Dry Run

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          cache: "npm"
          node-version: "24"

      - name: install dependencies
        run: npm ci --ignore-scripts

      # equivalent cli: renovate-config-validator
      - name: Renovate Lint Check
        run: npm run check:lint:renovate

      - name: Renovate PR generation
        env:
          LOG_LEVEL: debug
          RENOVATE_DRY_RUN: full
          RENOVATE_CONFIG_FILE: renovate/merged.json
          RENOVATE_GITHUB_COM_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          rm -rf renovate/
          mkdir renovate

          # Convert JSON5 → JSON
          npx json5 -c .github/renovate.json5 > renovate/base.json
          npx json5 -c .github/renovate-ci.json5 > renovate/ci.json

          # Merge configs with correct Renovate semantics:
          # - objects: deep merge
          # - packageRules: concatenate
          # - other arrays: override
          jq -s '
            def merge(a; b):
              if (a|type) == "object" and (b|type) == "object" then
                reduce (a|keys_unsorted + b|keys_unsorted | unique[]) as $k
                  ({}; .[$k] =
                    if ($k == "packageRules")
                       and (a[$k]|type == "array")
                       and (b[$k]|type == "array")
                    then
                      a[$k] + b[$k]
                    else
                      merge(a[$k]; b[$k])
                    end
                  )
              else
                b
              end;

            merge(.[0]; .[1])
          ' renovate/base.json renovate/ci.json > renovate/merged.json

          npm run generate:renovate:pr

      - name: Upload generated PR folders
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: renovate-generated-prs
          path: renovate
          if-no-files-found: warn
