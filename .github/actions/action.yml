name: Select Gems
description: Selects the Gems
inputs:
  token:
    description: Token used to add labels
    required: false
    type: string

runs:
  using: composite
  steps:
    - uses: actions/labeler@634933edcd8ababfe52f92936142cc22ac488b1b # v6.0.1
      name: Calculate Components
      if: ${{ github.event_name == 'pull_request' }}
      id: label
      with:
        repo-token: "${{ inputs.token }}"
        sync-labels: true

    - name: Build matrix JSON
      id: build
      shell: bash
      run: |
        deny='["ci", "deprecated"]'
        labels="${{ steps.label.outputs.all-labels || '' }}"
        # labels is a comma-separated string, convert to JSON array
        json=$(printf '%s\n' "$labels" | jq -R 'split(",")')

        # Remove deny-listed items
        filtered=$(echo "$json" | jq --argjson deny "$deny" '[ .[] | select(. as $l | $deny | index($l) | not) ]')

        # Guarantee valid JSON
        if [ -z "$filtered" ] || [ "$filtered" = "null" ]; then
          filtered='[]'
        fi

        {
          echo "matrix<<EOF"
          echo "$filtered"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"
