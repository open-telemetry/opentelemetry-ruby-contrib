services:
  mysql:
    image: mysql:9.6.0@sha256:24e450bbd24f621c71b10404c946cc9ea1cbb0e6e7464b2be2de5193dcf1d05b
    command: mysqld --mysql-native-password=ON
    environment:
      - MYSQL_DATABASE=mysql
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_PASSWORD=mysql
      - MYSQL_USER=mysql
    volumes:
      - init:/docker-entrypoint-initdb.d
    ports:
      - "3306:3306"
