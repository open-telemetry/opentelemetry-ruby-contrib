services:
  redis:
    image: redis:8.6.3@sha256:4d25e2fe601f7ffaeb4437cb6ced3518bc36edf34ebe98863c80836943d94529
    environment:
      REDIS_PASSWORD: passw0rd
    ports:
      - "6379:6379"
    command: ["redis-server", "--requirepass", "passw0rd"]
    healthcheck:
      test: ["CMD-SHELL", 'redis-cli -a "passw0rd" ping']
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data

volumes:
  redis_data:
