services:
  postgres:
    image: postgres:14.23@sha256:f3dfa878a04b91ea27f28b87949db4f4460f143a4feadb7ba161c8baf4db61b9
    environment:
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 5s
      timeout: 2s
      retries: 3
    volumes:
      - /var/run/postgresql:/var/run/postgresql
